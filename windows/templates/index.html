<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>YouTube Downloader</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0f1115;
    color: #e6e6e6;
    margin: 0;
    padding: 40px 20px;
    min-height: 100vh;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-weight: 600; letter-spacing: -0.02em; margin: 0 0 24px; }
  .card {
    background: #181b22;
    border: 1px solid #262a33;
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 18px;
  }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  input[type=text] {
    flex: 1;
    min-width: 240px;
    background: #0f1115;
    border: 1px solid #2a2f3a;
    color: #e6e6e6;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
  }
  input[type=text]:focus { border-color: #4c8bf5; }
  select, button {
    background: #0f1115;
    border: 1px solid #2a2f3a;
    color: #e6e6e6;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  button.primary { background: #4c8bf5; border-color: #4c8bf5; color: white; font-weight: 600; }
  button.primary:hover { filter: brightness(1.1); }
  button:disabled, select:disabled { opacity: 0.5; cursor: not-allowed; }
  .info {
    display: flex;
    gap: 14px;
    margin-top: 14px;
    padding: 12px;
    background: #0f1115;
    border: 1px solid #20242c;
    border-radius: 10px;
    align-items: center;
  }
  .info img { width: 100px; height: 56px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
  .info .meta-text { flex: 1; min-width: 0; }
  .info .vtitle { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .info .sub { font-size: 12px; color: #8a8f99; margin-top: 4px; }
  .info.loading .vtitle { color: #8a8f99; }
  .info.error { border-color: #5a2a2a; }
  .info.error .vtitle { color: #f87171; }
  .job { padding: 12px 14px; border: 1px solid #262a33; border-radius: 10px; margin-top: 10px; }
  .job .title { font-size: 14px; color: #c8c8c8; word-break: break-all; }
  .job .meta { font-size: 12px; color: #8a8f99; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .bar { height: 6px; background: #262a33; border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .bar > div { height: 100%; background: #4c8bf5; width: 0%; transition: width 0.3s; }
  .status-done { color: #4ade80; }
  .status-error { color: #f87171; }
  a { color: #4c8bf5; text-decoration: none; }
  a:hover { text-decoration: underline; }
  h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; color: #8a8f99; margin: 0; font-weight: 600; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .link-btn {
    background: none;
    border: none;
    color: #8a8f99;
    font-size: 12px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    font-family: inherit;
  }
  .link-btn:hover { color: #f87171; background: #20242c; }
  .link-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .file { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #20242c; font-size: 13px; }
  .file:last-child { border-bottom: none; }
  .file .name { word-break: break-all; padding-right: 12px; }
  .file .size { color: #8a8f99; white-space: nowrap; }
  .empty { color: #8a8f99; font-size: 13px; text-align: center; padding: 12px 0; }
  .hidden { display: none; }
  .file .name { cursor: pointer; }
  .file .name:hover { color: #4c8bf5; }
  .file-actions { display: flex; gap: 10px; align-items: center; white-space: nowrap; }
  .dl-link { color: #8a8f99; font-size: 16px; line-height: 1; padding: 2px 6px; border-radius: 6px; }
  .dl-link:hover { color: #4c8bf5; background: #20242c; text-decoration: none; }
  .player-card video, .player-card audio { width: 100%; border-radius: 8px; background: #000; display: block; }
  .player-card .ptitle { font-size: 13px; color: #c8c8c8; margin-bottom: 10px; word-break: break-all; padding-right: 30px; }
  .player-card { position: relative; }
  .close-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #0f1115;
    border: 1px solid #2a2f3a;
    color: #e6e6e6;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .close-btn:hover { color: #f87171; }
</style>
</head>
<body>
<div class="wrap">
  <h1>YouTube Downloader</h1>

  <div class="card">
    <div class="row">
      <input id="url" type="text" placeholder="https://youtube.com/watch?v=..." autofocus />
    </div>

    <div id="info" class="info hidden">
      <img id="thumb" alt="" />
      <div class="meta-text">
        <div id="vtitle" class="vtitle"></div>
        <div id="vsub" class="sub"></div>
      </div>
    </div>

    <div class="row" style="margin-top: 14px;">
      <select id="quality">
        <option value="best">Best available</option>
      </select>
      <button class="primary" id="go" disabled>Download</button>
      <button id="reset" type="button">Reset</button>
    </div>

    <div id="jobs"></div>
  </div>

  <div class="card player-card hidden" id="playerCard">
    <button class="close-btn" id="closePlayer" title="Close">×</button>
    <div class="ptitle" id="playerTitle"></div>
    <div id="playerSlot"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>Recent files</h2>
      <button class="link-btn" id="clearFiles" disabled>Clear all</button>
    </div>
    <div id="files"><div class="empty">No downloads yet.</div></div>
  </div>
</div>

<script>
const API_BASE = (location.protocol === 'http:' || location.protocol === 'https:')
  ? ''
  : 'http://127.0.0.1:8768';
const api = (path) => API_BASE + path;

const urlInput = document.getElementById('url');
const qualitySel = document.getElementById('quality');
const goBtn = document.getElementById('go');
const jobsEl = document.getElementById('jobs');
const filesEl = document.getElementById('files');
const infoEl = document.getElementById('info');
const thumbEl = document.getElementById('thumb');
const vtitleEl = document.getElementById('vtitle');
const vsubEl = document.getElementById('vsub');
const tracked = new Map();

let probeToken = 0;
let currentPresets = null;

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtDuration(secs) {
  if (!secs) return '';
  secs = Math.round(secs);
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  return h ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${m}:${String(s).padStart(2,'0')}`;
}

function setQualityOptions(presets) {
  currentPresets = presets;
  qualitySel.innerHTML = '';
  if (!presets || !presets.length) {
    qualitySel.innerHTML = '<option value="best">Best available</option>';
    goBtn.disabled = false;
    return;
  }
  // Best (auto) on top
  const opt = document.createElement('option');
  opt.value = 'best';
  opt.textContent = 'Best available';
  qualitySel.appendChild(opt);
  for (const p of presets) {
    const o = document.createElement('option');
    o.value = p.audio_only ? 'audio' : String(p.height);
    const size = p.size_mb ? ` — ${p.size_mb} MB` : '';
    o.textContent = `${p.label}${size}`;
    qualitySel.appendChild(o);
  }
  goBtn.disabled = false;
}

async function probe(url) {
  const myToken = ++probeToken;
  infoEl.classList.remove('hidden', 'error');
  infoEl.classList.add('loading');
  thumbEl.style.visibility = 'hidden';
  vtitleEl.textContent = 'Fetching info...';
  vsubEl.textContent = '';
  goBtn.disabled = true;

  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 20000);
  try {
    const r = await fetch(api('/api/info'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
      signal: ctrl.signal,
    });
    clearTimeout(timer);
    if (myToken !== probeToken) return;
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'failed');
    infoEl.classList.remove('loading');
    if (data.thumbnail) {
      thumbEl.src = data.thumbnail;
      thumbEl.style.visibility = 'visible';
    }
    vtitleEl.textContent = data.title || '';
    const parts = [];
    if (data.uploader) parts.push(data.uploader);
    if (data.duration) parts.push(fmtDuration(data.duration));
    vsubEl.textContent = parts.join(' · ');
    setQualityOptions(data.presets);
  } catch (e) {
    clearTimeout(timer);
    if (myToken !== probeToken) return;
    infoEl.classList.remove('loading');
    infoEl.classList.add('error');
    thumbEl.style.visibility = 'hidden';
    const aborted = e.name === 'AbortError';
    vtitleEl.textContent = aborted
      ? 'Request blocked or timed out — try an incognito window (a browser extension may be interfering).'
      : 'Could not fetch info: ' + e.message;
    vsubEl.textContent = '';
    // Still allow downloading with presets
    setQualityOptions([
      { label: '1080p', height: 1080, audio_only: false },
      { label: '720p', height: 720, audio_only: false },
      { label: '480p', height: 480, audio_only: false },
      { label: '360p', height: 360, audio_only: false },
      { label: 'Audio (mp3)', height: 0, audio_only: true },
    ]);
  }
}

let probeTimer = null;
function scheduleProbe() {
  clearTimeout(probeTimer);
  const url = urlInput.value.trim();
  if (!url) {
    infoEl.classList.add('hidden');
    goBtn.disabled = true;
    return;
  }
  if (!/^https?:\/\//.test(url)) {
    return;
  }
  probeTimer = setTimeout(() => probe(url), 400);
}

async function refreshFiles() {
  const r = await fetch(api('/api/list'));
  const list = await r.json();
  const clearBtn = document.getElementById('clearFiles');
  if (!list.length) {
    filesEl.innerHTML = '<div class="empty">No downloads yet.</div>';
    clearBtn.disabled = true;
    return;
  }
  filesEl.innerHTML = list.map(f => {
    const stream = api('/stream/' + encodeURIComponent(f.name));
    const dl = api('/file/' + encodeURIComponent(f.name));
    return `<div class="file"><span class="name" data-src="${stream}" data-name="${escapeHtml(f.name)}">${escapeHtml(f.name)}</span><span class="file-actions"><a class="dl-link" href="${dl}" title="Download" download>↓</a><span class="size">${f.size_mb} MB</span></span></div>`;
  }).join('');
  clearBtn.disabled = false;
  filesEl.querySelectorAll('.name').forEach(el => {
    el.addEventListener('click', () => openPlayer(el.dataset.src, el.dataset.name));
  });
}

function openPlayer(src, name) {
  const slot = document.getElementById('playerSlot');
  const card = document.getElementById('playerCard');
  const title = document.getElementById('playerTitle');
  const isAudio = /\.(mp3|m4a|wav|ogg|aac|flac)$/i.test(name);
  const tag = isAudio ? 'audio' : 'video';
  slot.innerHTML = `<${tag} controls autoplay src="${src}"></${tag}>`;
  title.textContent = name;
  card.classList.remove('hidden');
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closePlayer() {
  const slot = document.getElementById('playerSlot');
  const card = document.getElementById('playerCard');
  slot.innerHTML = '';
  card.classList.add('hidden');
}

document.getElementById('closePlayer').addEventListener('click', closePlayer);

async function clearAllFiles() {
  const r = await fetch(api('/api/list'));
  const list = await r.json();
  if (!list.length) return;
  if (!confirm(`Delete ${list.length} file${list.length === 1 ? '' : 's'} from the downloads folder? This cannot be undone.`)) return;
  await fetch(api('/api/files'), { method: 'DELETE' });
  refreshFiles();
}

document.getElementById('clearFiles').addEventListener('click', clearAllFiles);

function renderJob(jobId, job) {
  const el = tracked.get(jobId);
  const pctNum = parseFloat((job.percent || '0').replace('%','')) || 0;
  const title = job.title || job.url || '...';
  let meta = '';
  if (job.status === 'downloading') meta = `${job.percent || ''} · ${job.speed || ''} · ETA ${job.eta || ''}`;
  else if (job.status === 'processing') meta = 'Processing / merging...';
  else if (job.status === 'queued') meta = 'Queued...';
  else if (job.status === 'done') meta = `<span class="status-done">Done →</span> <a href="${api('/file/' + encodeURIComponent(job.filename))}">${escapeHtml(job.filename)}</a>`;
  else if (job.status === 'error') meta = `<span class="status-error">Error:</span> ${escapeHtml(job.error || '')}`;
  el.innerHTML = `
    <div class="title">${escapeHtml(title)}</div>
    <div class="meta">${meta}</div>
    <div class="bar"><div style="width:${pctNum}%"></div></div>
  `;
}

async function pollJob(jobId) {
  while (true) {
    const r = await fetch(api('/api/status/' + jobId));
    if (!r.ok) return;
    const job = await r.json();
    renderJob(jobId, job);
    if (job.status === 'done' || job.status === 'error') {
      refreshFiles();
      return;
    }
    await new Promise(res => setTimeout(res, 700));
  }
}

async function startDownload() {
  const url = urlInput.value.trim();
  if (!url) return;
  const val = qualitySel.value;
  const body = { url };
  if (val === 'audio') {
    body.audio_only = true;
  } else if (val !== 'best') {
    body.height = parseInt(val, 10);
  }
  goBtn.disabled = true;
  try {
    const r = await fetch(api('/api/download'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await r.json();
    if (data.job_id) {
      const div = document.createElement('div');
      div.className = 'job';
      jobsEl.prepend(div);
      tracked.set(data.job_id, div);
      renderJob(data.job_id, { status: 'queued', url });
      pollJob(data.job_id);
      urlInput.value = '';
      infoEl.classList.add('hidden');
      qualitySel.innerHTML = '<option value="best">Best available</option>';
    } else {
      alert('Error: ' + (data.error || 'unknown'));
    }
  } finally {
    goBtn.disabled = qualitySel.options.length <= 1 || !urlInput.value.trim();
    urlInput.focus();
  }
}

function resetForm() {
  probeToken++; // invalidate any in-flight probe
  clearTimeout(probeTimer);
  urlInput.value = '';
  infoEl.classList.add('hidden');
  infoEl.classList.remove('loading', 'error');
  thumbEl.removeAttribute('src');
  thumbEl.style.visibility = 'hidden';
  vtitleEl.textContent = '';
  vsubEl.textContent = '';
  qualitySel.innerHTML = '<option value="best">Best available</option>';
  jobsEl.innerHTML = '';
  tracked.clear();
  goBtn.disabled = true;
  urlInput.focus();
}

document.getElementById('reset').addEventListener('click', resetForm);
goBtn.addEventListener('click', startDownload);
urlInput.addEventListener('input', scheduleProbe);
urlInput.addEventListener('paste', () => setTimeout(scheduleProbe, 0));
urlInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !goBtn.disabled) startDownload(); });
refreshFiles();
setInterval(refreshFiles, 5000);
</script>
</body>
</html>
